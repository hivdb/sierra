name: Java CI with Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      enable_regression_test:
        description: 'Run slow regression tests'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: hivdb/sierra-ci:latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assemble
    - name: Run tests
      run: ./gradlew test
    - name: Run regression tests
      if: ${{ github.event.inputs.enable_regression_test == 'true' }}
      run: ./gradlew test -PenableRegressionTest
